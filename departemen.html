  <style>
    .dep-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 26px;
    }

    .dep-tab {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 18px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-2);
      font-weight: 600;
      font-size: 14.5px;
      cursor: pointer;
      transition: all .22s var(--ease);
      font-family: inherit;
    }

    .dep-tab:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .dep-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .dep-tab .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    .dep-content {
      animation: fadeUp .4s var(--ease);
      margin-top: 32px;
    }

    .dep-hero {
      display: flex;
      gap: 22px;
      padding: 30px;
      align-items: flex-start;
    }

    .dep-hero-icon {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .dep-hero-tag {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .dep-hero h2 {
      font-size: 28px;
      margin: 4px 0 10px;
    }

    .dep-hero p {
      color: var(--color-text-2);
      font-size: 16px;
    }

    .dep-vm {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 18px;
    }

    .dep-vm-card {
      padding: 28px;
    }

    .dep-vm-card h3 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .dep-vm-card>p {
      color: var(--color-text-2);
    }

    .dep-sec-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      margin: 44px 0 22px;
      font-family: var(--font-display);
      font-weight: 700;
    }

    .proker-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .proker-card {
      padding: 26px;
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }

    .proker-card:hover {
      border-color: var(--accent);
    }

    .proker-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 11px;
      border-radius: var(--radius-pill);
      margin-bottom: 14px;
    }

    .proker-card h4 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .proker-card p {
      color: var(--color-text-2);
      font-size: 14.5px;
      flex: 1;
    }

    .proker-more {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      font-size: 14px;
      margin-top: 16px;
      transition: gap .2s;
    }

    .proker-card:hover .proker-more {
      gap: 10px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(10, 10, 16, .55);
      backdrop-filter: blur(6px);
      animation: fadeIn .2s ease;
    }

    .modal-overlay.hidden {
      display: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    .modal {
      position: relative;
      max-width: 520px;
      width: 100%;
      padding: 34px;
      animation: popIn .3s var(--ease);
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(.94) translateY(10px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .modal-close {
      position: absolute;
      top: 18px;
      right: 18px;
    }

    .modal-title {
      font-size: 26px;
      margin: 14px 0 12px;
      font-family: var(--font-display);
      font-weight: 700;
    }

    .modal-desc {
      color: var(--color-text-2);
      font-size: 16px;
      margin-bottom: 24px;
    }

    .modal-meta {
      display: grid;
      gap: 14px;
      border-top: 1px solid var(--color-border);
      padding-top: 22px;
    }

    .modal-meta>div {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .modal-meta-label {
      color: var(--color-text-3);
      font-size: 14px;
    }

    .modal-meta b {
      font-size: 14.5px;
    }

    @media(max-width:768px) {
      .dep-vm {
        grid-template-columns: 1fr;
      }

      .proker-grid {
        grid-template-columns: 1fr;
      }

      .dep-hero {
        flex-direction: column;
      }

    }
  </style>
  <script>
