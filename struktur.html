function initials(name) {
  if (name.startsWith('—')) return '?'
  return name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase()
}

/* ── SVG Connectors + Pulse ── */
function drawConnectors() {
  const svg  = document.getElementById('orgSvg')
  const wrap = document.getElementById('orgWrap')
  if (!svg || !wrap) return

  const wrapRect = wrap.getBoundingClientRect()
  svg.innerHTML  = ''

  function getRect(el) {
    const r = el.getBoundingClientRect()
    return {
      top:    r.top    - wrapRect.top,
      bottom: r.bottom - wrapRect.top,
      left:   r.left   - wrapRect.left,
      right:  r.right  - wrapRect.left,
      cx:     r.left   - wrapRect.left + r.width  / 2,
      cy:     r.top    - wrapRect.top  + r.height / 2,
    }
  }

  function drawCurve(fromEl, toEl, color, delay, duration) {
  if (!fromEl || !toEl) return
  const from = getRect(fromEl)
  const to   = getRect(toEl)

  const x1 = from.cx, y1 = from.bottom
  const x2 = to.cx,   y2 = to.top
  const mid = (y1 + y2) / 2

  // Right-angle connector — turun dulu, lalu horizontal, lalu turun lagi
  const d = `M ${x1} ${y1} L ${x1} ${mid} L ${x2} ${mid} L ${x2} ${y2}`

    // Static dim line
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'path')
    line.setAttribute('d', d)
    line.setAttribute('stroke', color)
    line.setAttribute('stroke-width', '1.5')
    line.setAttribute('fill', 'none')
    line.setAttribute('opacity', '0.2')
    svg.appendChild(line)

    // Pulse
    const pulse = document.createElementNS('http://www.w3.org/2000/svg', 'path')
    pulse.setAttribute('d', d)
    pulse.setAttribute('stroke', color)
    pulse.setAttribute('stroke-width', '2.5')
    pulse.setAttribute('fill', 'none')
    pulse.setAttribute('opacity', '0.85')

    const totalLen = 300
    pulse.setAttribute('stroke-dasharray', `12 ${totalLen}`)

    const anim = document.createElementNS('http://www.w3.org/2000/svg', 'animate')
    anim.setAttribute('attributeName', 'stroke-dashoffset')
    anim.setAttribute('from',         '0')
    anim.setAttribute('to',           `-${totalLen + 12}`)
    anim.setAttribute('dur',          `${duration}s`)
    anim.setAttribute('begin',        `${delay}s`)
    anim.setAttribute('repeatCount',  'indefinite')

    pulse.appendChild(anim)
    svg.appendChild(pulse)
  }

  // Ambil elemen avatar (lebih akurat untuk posisi)
  const ketumEl  = document.querySelector('#node-ketum  .org-node-avatar')
  const sekumEl  = document.querySelector('#node-sekum  .org-node-avatar')
  const bendumEl = document.querySelector('#node-bendum .org-node-avatar')

  // Ketum → Sekum
  drawCurve(ketumEl, sekumEl,  '#7F77DD', 0,   1.8)
  // Ketum → Bendum
  drawCurve(ketumEl, bendumEl, '#7F77DD', 0.4, 2.0)

  // Ketum → tiap Kadep
  DEPTS.forEach((d, i) => {
    const kadepEl = document.querySelector(`#node-kadep-${i} .org-node-avatar`)
    drawCurve(ketumEl, kadepEl, d.color, i * 0.15, 2.2 + i * 0.05)
  })
}

window.toggleDept = function(id) {
  document.getElementById(`dept-${id}`)?.classList.toggle('open')
}

  resizeTimer = setTimeout(drawConnectors, 150)
